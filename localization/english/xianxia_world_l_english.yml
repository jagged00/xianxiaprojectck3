 trait_sect_disciple_desc:0 "A junior cultivator formally inducted into sect life."
 trait_sect_elder_desc:0 "A senior cultivator who guides disciples and protects the sect."
 trait_sect_leader_desc:0 "The recognized master of a sect and holder of its mandate."
 trait_jianghu_righteous_desc:0 "Known in the Jianghu for righteous conduct and honorable cultivation."
 trait_jianghu_demonic_desc:0 "Known in the Jianghu for ruthless, demonic-path methods."
 trait_weapon_path_sword_desc:0 "This cultivator follows the Sword Path."
 trait_weapon_path_saber_desc:0 "This cultivator follows the Saber Path."
 trait_weapon_path_spear_desc:0 "This cultivator follows the Spear Path."
 trait_weapon_path_fist_desc:0 "This cultivator follows the Body/Fist Path."

 found_sect_domain_decision:0 "Found a Sect Domain"
 found_sect_domain_decision_desc:0 "Declare your mountain and counties as a true sect domain. Elders and disciples will be formalized under your authority."
 found_sect_domain_decision_tooltip:0 "Create a stable sect hierarchy and empower your realm as a map-visible sect polity."
 found_sect_domain_decision_confirm:0 "Raise the mountain banners."

 refine_spirit_pill_decision:0 "Refine a Spirit Pill"
 refine_spirit_pill_decision_desc:0 "Consume rare herbs and spirit stones to attempt high-level alchemy. Success grants power, failure brings backlash."
 refine_spirit_pill_decision_tooltip:0 "Risk/reward alchemy with possible cultivation deviation or death."
 refine_spirit_pill_decision_confirm:0 "Ignite the cauldron."

 comprehend_martial_manual_decision:0 "Comprehend a Martial Manual"
 comprehend_martial_manual_decision_desc:0 "Study sword scriptures, saber diagrams, body-method tablets, and spear intent to deepen your martial path."
 comprehend_martial_manual_decision_tooltip:0 "Gain a weapon path and cultivation-focused martial progress."
 comprehend_martial_manual_decision_confirm:0 "Turn the jade pages."

 enter_secret_realm_decision:0 "Enter a Secret Realm"
 enter_secret_realm_decision_desc:0 "Venture into hidden grottoes, fragmented worlds, and inheritance caverns where fortune and danger coexist."
 enter_secret_realm_decision_tooltip:0 "Gain inheritances (gold or cultivation progress) with expedition risk."
 enter_secret_realm_decision_confirm:0 "Step through the hidden gate."

 undergo_heavenly_tribulation_decision:0 "Undergo Heavenly Tribulation"
 undergo_heavenly_tribulation_decision_desc:0 "When your realm matures, Heaven tests your Dao. Endure thunder and karmic backlash to ascend—or perish."
 undergo_heavenly_tribulation_decision_tooltip:0 "High-risk breakthrough pressure with success, deviation, or death outcomes."
 undergo_heavenly_tribulation_decision_confirm:0 "Face Heaven's judgment."

 xianxia_world.1100.t:0 "Jianghu Oath Gathering"
 xianxia_world.1100.desc:0 "Messengers spread your invitation across rivers and lakes. Swordsmen, sect envoys, alchemists, and wanderers gather for a true martial tournament."
 xianxia_world.1100.a:0 "Let the tournament begin."

 xianxia_world.1200.t:0 "Sect Domain Proclaimed"
 xianxia_world.1200.desc:0 "Your mountain, halls, and attached counties are reorganized as a true sect domain. Elders administer, disciples train, and your banner marks the map."
 xianxia_world.1200.a:0 "The sect stands in the mortal world."

 xianxia_world.1300.t:0 "Spirit Pill Refinement"
 xianxia_world.1300.desc:0 "Flames rise within the cauldron. Will this batch become a heaven-defying medicine, or poison your meridians?"
 xianxia_world.1300.a:0 "Seal the furnace."

 xianxia_world.1400.t:0 "Manual Comprehension"
 xianxia_world.1400.desc:0 "You meditate on inherited diagrams and annotations left by long-dead masters."
 xianxia_world.1400.a:0 "My weapon path clarifies."

 xianxia_world.1500.t:0 "Secret Realm Expedition"
 xianxia_world.1500.desc:0 "Inside the hidden realm, spirit beasts prowl and demonic echoes whisper. Among ruins, an inheritance may still remain."
 xianxia_world.1500.a:0 "Take what destiny allows."

 xianxia_world.1600.t:0 "Heavenly Tribulation"
 xianxia_world.1600.desc:0 "Thunderclouds coil above your head and lightning writes judgment in the sky."
 xianxia_world.1600.a:0 "I challenge Heaven."

 sect_headquarters_realm:0 "Sect Headquarters"
 sect_headquarters_realm_desc:0 "This realm is organized around sect rule and martial administration."
 sect_resource_surplus:0 "Sect Resource Surge"
 sect_resource_surplus_desc:0 "Tributes and spirit resources pour in after a successful gathering."
 alchemy_backlash:0 "Alchemy Backlash"
 alchemy_backlash_desc:0 "Failed refinement has damaged meridians and vitality."
 perfected_spirit_pill:0 "Perfected Spirit Pill"
 perfected_spirit_pill_desc:0 "A high-grade spirit pill has tempered body and soul."
 manual_comprehension:0 "Manual Comprehension"
 manual_comprehension_desc:0 "Recent scripture study accelerates cultivation insight."
 tribulation_survivor:0 "Tribulation Survivor"
 tribulation_survivor_desc:0 "This cultivator survived heavenly lightning and hardened their Dao heart."
 cultivation_deviation:0 "Cultivation Deviation"
 cultivation_deviation_desc:0 "Qi flow has destabilized, causing severe internal backlash."
 secret_realm_inheritance:0 "Secret Realm Inheritance"
 secret_realm_inheritance_desc:0 "An ancient inheritance grants resources and deep cultivation guidance."
 high_realm_longevity:0 "High-Realm Longevity"
 high_realm_longevity_desc:0 "Profound cultivation extends life and greatly reduces mundane infirmities."
 jianghu_reputation_righteous:0 "Righteous Jianghu Reputation"
 jianghu_reputation_righteous_desc:0 "This character is known as a protector of orthodox Jianghu order."
 jianghu_reputation_demonic:0 "Demonic Jianghu Reputation"
 jianghu_reputation_demonic_desc:0 "This character's name inspires fear as one who walks a demonic path."
 sect_governance_feudal_adapted:0 "Sect-Adapted Feudal Governance"
 sect_governance_feudal_adapted_desc:0 "Feudal institutions have been refit to match sect hierarchy and martial obligations."
 sect_governance_republic_adapted:0 "Sect-Adapted Mercantile Governance"
 sect_governance_republic_adapted_desc:0 "Merchant governance now integrates sect tribute and cultivator authority."
 sect_governance_clan_adapted:0 "Sect-Adapted Clan Governance"
 sect_governance_clan_adapted_desc:0 "Clan structures are redirected toward sect loyalty, seniority, and cultivation merit."
 sect_governance_tribal_adapted:0 "Sect-Adapted Martial Tribal Governance"
 sect_governance_tribal_adapted_desc:0 "Tribal warbands are reorganized into sect battle lineages and outer-hall cohorts."
 sect_governance_theocracy_adapted:0 "Sect-Adapted Spiritual Governance"
 sect_governance_theocracy_adapted_desc:0 "Temples and scripture institutions are integrated into cultivation orthodoxy and sect law."
 sect_governance_administrative_adapted:0 "Sect-Adapted Administrative Governance"
 sect_governance_administrative_adapted_desc:0 "Bureaucratic governance is remolded around sect registries, resource quotas, and elder review."
 jianghu_realm_friction:0 "Mortal Governance Friction"
 jianghu_realm_friction_desc:0 "A non-cultivator ruler struggles to command a realm shaped by Jianghu and sect expectations."
